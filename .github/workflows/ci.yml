name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      DJANGO_SECRET_KEY: ci-secret-key
      SECRET_KEY: ci-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: 127.0.0.1,localhost,testserver

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare static dir
        run: mkdir -p static

      - name: Django checks
        run: |
          python manage.py check
          python manage.py migrate --noinput

      - name: Seed scenarios (optional in CI)
        run: |
          if [ -f datasets/phishing_email.csv ] && [ -f datasets/emails.csv ]; then
            python manage.py seed_scenarios
          else
            echo "datasets/ CSV files are not available in CI checkout; skipping seed_scenarios"
          fi

      - name: Model retrain sanity (fallback allowed if Kaggle absent)
        run: python manage.py retrain_models

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
